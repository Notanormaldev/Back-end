
services:
  backend:
    build: ./Backend
    ports:
      -3000:3000
    volumes:
      -./Backend:/app
      -backend_node_modules:/app/node_modules
  frontend:
    build: ./Frontend
    ports:
      -5173:5173
    volumes:
      -./Frontend:/app
      -frontend_node_modules:/app/node_modules


volumes:
  backend_node_modules:
  frontend_node_modules: