apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  sandbox-ingress
  labels:
    app.kubernetes.io/name:  sandbox-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sandbox-service
                port:
                  number: 80

    - host: "*.preview.localhost"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: router-service
                port:
                  number: 80