apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/sandbox
        pathType: Prefix
        backend:
          service:
            name: sandbox-service
            port:
              number: 80 



  - http:
        paths:
          - pathType: Prefix
            path: "/api/ai"
            backend:
              service:
                name: ai-service
                port:
                  number: 80
                  

  - host: "*.preview.localhost"
    http:
      paths:
        - pathType: Prefix
          path: "/"
          backend:
              service:
                name: router-service
                port:
                  number: 80


  - host: "*.agent.localhost"
    http:
      paths:
        - pathType: Prefix
          path: "/"
          backend:
              service:
                name: router-service
                port:
                  number: 80